<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediaHub - Galería Permanente</title>
    <style>
        :root {
            --primary: #6366f1;
            --accent: #22c55e;
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f8fafc;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .container { width: 100%; max-width: 900px; }
        h1 { text-align: center; color: var(--primary); }
        h2 { border-bottom: 2px solid var(--card); padding-bottom: 10px; margin-top: 40px; }

        .upload-section {
            background: var(--card);
            padding: 20px;
            border-radius: 15px;
            border: 2px dashed var(--primary);
            text-align: center;
            margin-bottom: 20px;
        }

        #fileInput { display: none; }
        .btn-upload {
            background: var(--primary);
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            display: inline-block;
            font-weight: bold;
        }

        .media-gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .media-item {
            background: var(--card);
            padding: 15px;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        video, audio { width: 100%; border-radius: 8px; }

        .btn-project {
            background-color: var(--accent);
            color: white;
            border: none;
            padding: 8px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }

        .badge {
            background: var(--primary);
            font-size: 0.7em;
            padding: 2px 8px;
            border-radius: 10px;
            vertical-align: middle;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>MediaHub</h1>
    
    <div class="upload-section">
        <p>Carga temporal (se borra al cerrar)</p>
        <label for="fileInput" class="btn-upload">Seleccionar Archivos</label>
        <input type="file" id="fileInput" accept="video/*,audio/*" multiple>
    </div>

    <h2>Galería Permanente <span class="badge">Desde GitHub</span></h2>
    <div class="media-gallery" id="permanentGallery">
        <script>
            // Escribe aquí los nombres exactos de los archivos que subas a GitHub
            const archivosFijos = [
                'video_educacion_fisica.mp4', 
                'clase_informatica.mp4',
                'musica_fondo.mp3'
            ];
        </script>
    </div>

    <h2>Cargas Recientes</h2>
    <div class="media-gallery" id="recentGallery">
        <p id="emptyMsg" style="opacity:0.5">No has subido nada en esta sesión.</p>
    </div>
</div>

<script>
    const fileInput = document.getElementById('fileInput');
    const recentGallery = document.getElementById('recentGallery');
    const permanentGallery = document.getElementById('permanentGallery');

    // Cargar archivos permanentes al iniciar
    window.onload = () => {
        if (typeof archivosFijos !== 'undefined') {
            archivosFijos.forEach(nombre => {
                createMediaElement(nombre, nombre, permanentGallery, true);
            });
        }
    };

    fileInput.addEventListener('change', (e) => {
        document.getElementById('emptyMsg').style.display = 'none';
        Array.from(e.target.files).forEach(file => {
            const url = URL.createObjectURL(file);
            createMediaElement(file.name, url, recentGallery, false);
        });
    });

    function createMediaElement(name, url, container, isPermanent) {
        const div = document.createElement('div');
        div.className = 'media-item';
        
        const title = document.createElement('h3');
        title.style.fontSize = '0.9rem';
        title.textContent = name;
        div.appendChild(title);

        const isVideo = name.toLowerCase().endsWith('.mp4') || name.toLowerCase().endsWith('.mov');
        const media = document.createElement(isVideo ? 'video' : 'audio');
        media.src = url;
        media.controls = true;
        media.preload = "metadata";
        
        const btn = document.createElement('button');
        btn.className = 'btn-project';
        btn.innerHTML = ' proyectar';
        btn.onclick = () => {
            if (media.requestFullscreen) media.requestFullscreen();
            else if (media.webkitRequestFullscreen) media.webkitRequestFullscreen();
            media.play();
        };

        div.appendChild(media);
        div.appendChild(btn);
        container.prepend(div);
    }
</script>

</body>
</html>
